name: Flatpak Build

on:
  push:
    tags:
      - '*-flatpak'

permissions:
  contents: write

jobs:
  flatpak:
    name: Flathub-Style Build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Checkout shared-modules
        run: git clone --depth 1 https://github.com/flathub/shared-modules.git

      - name: Install flatpak-flutter
        run: |
          git clone --depth 1 --branch 0.14.1 https://github.com/TheAppgineer/flatpak-flutter.git /opt/flatpak-flutter
          pip install packaging pyyaml tomlkit

      - name: Generate offline manifest
        run: python /opt/flatpak-flutter/flatpak-flutter.py flatpak/flatpak-flutter.yml

      - name: Debug generated manifest
        run: |
          echo "=== Sources ==="
          python3 -c "
import yaml
with open('com.anonlisten.hollow.yml') as f:
    m = yaml.safe_load(f)
for mod in m.get('modules', []):
    print(f'Module: {mod.get(\"name\", \"(no name)\")}')
    for src in mod.get('sources', []):
        print(f'  {src.get(\"type\")}: {src.get(\"path\") or src.get(\"url\") or \"(no path/url)\"}  dest={src.get(\"dest\", \"(none)\")}')
"
          echo "=== flatpak/scripts/ contents ==="
          ls -la flatpak/scripts/
          echo "=== Build dir check ==="
          ls -la /__w/HOLLOW-flatpak/HOLLOW-flatpak/flatpak/scripts/ 2>/dev/null || echo "GITHUB_WORKSPACE not accessible yet"

      - name: Build
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: HOLLOW.flatpak
          manifest-path: com.anonlisten.hollow.yml
          cache-key: flatpak-builder-${{ hashFiles('flatpak/flatpak-flutter.yml', 'flatpak/foreign.json') }}
          upload-artifact: true

      - name: Install bundle
        run: flatpak install --user -y --bundle HOLLOW.flatpak

      - name: Smoke test
        run: |
          timeout 30 xvfb-run flatpak run com.anonlisten.hollow 2>&1 | head -20
          rc=$?
          if [ $rc -eq 124 ]; then
            echo "App ran without crashing (timeout at 30s)"
          else
            exit $rc
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: HOLLOW.flatpak
          body: |
            Flatpak build for ${{ github.ref_name }}
          make_latest: false
