name: Rust Coverage

on:
  push:
    branches: [main]
    paths:
      - "rust/hollow_core/**"
      - ".github/workflows/rust-coverage.yml"
  pull_request:
    branches: [main]
    paths:
      - "rust/hollow_core/**"
      - ".github/workflows/rust-coverage.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: Test & Coverage
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: rust/hollow_core

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/hollow_core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/hollow_core/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install OpenSSL (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install openssl -y --no-progress
          echo "OPENSSL_DIR=C:\Program Files\OpenSSL-Win64" >> $env:GITHUB_ENV
          echo "OPENSSL_LIB_DIR=C:\Program Files\OpenSSL-Win64\lib\VC\x64\MD" >> $env:GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=C:\Program Files\OpenSSL-Win64\include" >> $env:GITHUB_ENV

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests with coverage
        run: >-
          cargo llvm-cov --lib --lcov --output-path lcov.info
          --ignore-filename-regex "(frb_generated|/api/|/node/|/storage/|/archive/)"

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: rust/hollow_core/lcov.info
          flags: ${{ matrix.os == 'windows-latest' && 'rust-windows' || 'rust-linux' }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
