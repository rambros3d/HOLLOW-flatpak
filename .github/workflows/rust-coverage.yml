name: Rust Coverage

on:
  push:
    branches: [main]
    paths:
      - "rust/hollow_core/**"
      - ".github/workflows/rust-coverage.yml"
  pull_request:
    branches: [main]
    paths:
      - "rust/hollow_core/**"
      - ".github/workflows/rust-coverage.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: Test & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust/hollow_core

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/hollow_core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/hollow_core/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests with coverage
        run: >-
          cargo llvm-cov --lib --lcov --output-path lcov.info
          --ignore-filename-regex "(frb_generated|/api/|/node/|/storage/|/archive/)"

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: rust/hollow_core/lcov.info
          flags: rust
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
