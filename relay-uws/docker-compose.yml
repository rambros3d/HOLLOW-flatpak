services:
  relay:
    build: .
    ports:
      - "443:443"
    environment:
      - TURN_SECRET=${TURN_SECRET}
    command:
      - --port
      - "443"
      - --public-ip
      - ${PUBLIC_IP}
      - --domain
      - ${RELAY_DOMAIN}
      - --cert-file
      - /certs/fullchain.pem
      - --key-file
      - /certs/privkey.pem
    volumes:
      - certs:/certs:ro
      - ./keys.json:/data/keys.json:ro
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: >
      sh -c "
        certbot certonly --standalone --non-interactive --agree-tos
          --email ${CERTBOT_EMAIL}
          -d ${RELAY_DOMAIN}
          --cert-path /etc/letsencrypt/fullchain.pem
          --key-path /etc/letsencrypt/privkey.pem
        && cp /etc/letsencrypt/live/${RELAY_DOMAIN}/fullchain.pem /etc/letsencrypt/fullchain.pem
        && cp /etc/letsencrypt/live/${RELAY_DOMAIN}/privkey.pem /etc/letsencrypt/privkey.pem
        && while :; do sleep 12h; certbot renew --quiet
          && cp /etc/letsencrypt/live/${RELAY_DOMAIN}/fullchain.pem /etc/letsencrypt/fullchain.pem
          && cp /etc/letsencrypt/live/${RELAY_DOMAIN}/privkey.pem /etc/letsencrypt/privkey.pem; done
      "
    ports:
      - "80:80"

  coturn:
    image: coturn/coturn:latest
    network_mode: host
    volumes:
      - ./turnserver.conf:/etc/turnserver.conf:ro
    restart: unless-stopped

volumes:
  certs:
  certbot-www:
